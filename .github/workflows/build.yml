name: Build Kinescope

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python Virtual Environment (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install -r backend\requirements.txt
        shell: cmd

      - name: Setup Python Virtual Environment (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r backend/requirements.txt
        shell: bash

      - name: Download and Set up FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path bin
          curl.exe -L -o ffmpeg.zip https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "temp_ffmpeg"
          Copy-Item -Path "temp_ffmpeg\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "bin\"
          Copy-Item -Path "temp_ffmpeg\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe" -Destination "bin\"
          Remove-Item -Recurse -Force temp_ffmpeg, ffmpeg.zip
        shell: pwsh

      - name: Download and Set up FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p bin
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            SUFFIX="arm64"
          else
            SUFFIX="x64"
          fi
          curl -L -o bin/ffmpeg https://github.com/shaka-project/static-ffmpeg-binaries/releases/download/n8.0.1-1/ffmpeg-osx-$SUFFIX
          curl -L -o bin/ffprobe https://github.com/shaka-project/static-ffmpeg-binaries/releases/download/n8.0.1-1/ffprobe-osx-$SUFFIX
          chmod +x bin/ffmpeg bin/ffprobe
        shell: bash

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Build Script (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          .venv\Scripts\python build_exe.py
        shell: cmd

      - name: Run Build Script (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          .venv/bin/python build_exe.py
        shell: bash

      - name: Package macOS App
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r Kinescope.app.zip Kinescope.app
        shell: bash

      - name: Upload Windows Binary Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Kinescope-Windows
          path: dist/Kinescope.exe

      - name: Upload macOS App Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Kinescope-macOS
          path: dist/Kinescope.app.zip

      - name: Release Assets (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Kinescope.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Assets (macOS)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Kinescope.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
